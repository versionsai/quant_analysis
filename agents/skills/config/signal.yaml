# -*- coding: utf-8 -*-
version: "1.0.0"
name: "signal_skill"
description: "量化信号生成策略配置"

params:
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  lookback: 20
  min_volume_ratio: 1.5

filters:
  min_price: 1.0
  max_price: 1000.0
  min_volume: 1000000
  min_amount: 10000000

weights:
  macd_signal: 0.4
  price_action: 0.3
  volume: 0.3

target_loss:
  profit_target_pct: 5.0
  stop_loss_pct: 3.0

pool:
  mode: "dynamic"
  dynamic_pool_enabled: true
  include_today_recommends: true
  include_current_holdings: true
  etf_limit: 20
  stock_limit: 50
