# -*- coding: utf-8 -*-
version: "1.0.0"
name: "risk_skill"
description: "风控规则配置"

rules:
  max_positions: 3
  max_position_pct: 0.3
  total_position_pct: 0.9

  stop_loss:
    enabled: true
    default_pct: 3.0
    trailing_stop: false

  take_profit:
    enabled: true
    default_pct: 5.0
    partial_exit:
      enabled: true
      levels:
        - pct: 3.0
          exit_ratio: 0.5
        - pct: 5.0
          exit_ratio: 1.0

  position_size:
    min_shares: 100
    lot_size: 100
    max_single_amount: 300000

  blacklist:
    enabled: false
    symbols: []
