# 部署到NAS

name: Deploy to NAS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Prefer secrets, but allow workflow/repo variables as fallback (Gitea UI: 设置-工作流-变量).
      NAS_HOST: ${{ secrets.NAS_HOST }}
      NAS_PORT: ${{ secrets.NAS_PORT }}
      NAS_USER: ${{ secrets.NAS_USER }}
      NAS_PASSWORD: ${{ secrets.NAS_PASSWORD }}
      NAS_PROJECT_DIR: ${{ secrets.NAS_PROJECT_DIR }}
      NAS_HOST_VAR: ${{ vars.NAS_HOST }}
      NAS_PORT_VAR: ${{ vars.NAS_PORT }}
      NAS_USER_VAR: ${{ vars.NAS_USER }}
      NAS_PASSWORD_VAR: ${{ vars.NAS_PASSWORD }}
      NAS_PROJECT_DIR_VAR: ${{ vars.NAS_PROJECT_DIR }}
      # Optional: bootstrap clone on NAS when target dir is not a git repo.
      NAS_GIT_URL: ${{ secrets.NAS_GIT_URL }}
      NAS_GIT_REF: ${{ secrets.NAS_GIT_REF }}
      NAS_GIT_URL_VAR: ${{ vars.NAS_GIT_URL }}
      NAS_GIT_REF_VAR: ${{ vars.NAS_GIT_REF }}
      # Push service env (.env on NAS). Prefer secrets; allow vars as fallback.
      BARK_KEY: ${{ secrets.BARK_KEY }}
      PUSH_TIME_MORNING: ${{ secrets.PUSH_TIME_MORNING }}
      PUSH_TIME_AFTERNOON: ${{ secrets.PUSH_TIME_AFTERNOON }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      BARK_KEY_VAR: ${{ vars.BARK_KEY }}
      PUSH_TIME_MORNING_VAR: ${{ vars.PUSH_TIME_MORNING }}
      PUSH_TIME_AFTERNOON_VAR: ${{ vars.PUSH_TIME_AFTERNOON }}
      LOG_LEVEL_VAR: ${{ vars.LOG_LEVEL }}
    steps:
      - name: Install SSH Client
        run: |
          set -e
          if command -v apt-get >/dev/null 2>&1; then
            (sudo -n true 2>/dev/null && sudo apt-get update && sudo apt-get install -y openssh-client sshpass) || \
            (apt-get update && apt-get install -y openssh-client sshpass)
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache openssh-client sshpass
          elif command -v yum >/dev/null 2>&1; then
            yum install -y openssh-clients sshpass
          else
            echo "Unsupported runner OS: no apt-get/apk/yum found" >&2
            exit 1
          fi

      - name: Deploy to NAS
        run: |
          set -euo pipefail

          # Resolve inputs (secret first, then variable fallback).
          NAS_HOST="${NAS_HOST:-${NAS_HOST_VAR:-}}"
          NAS_PORT="${NAS_PORT:-${NAS_PORT_VAR:-}}"
          NAS_USER="${NAS_USER:-${NAS_USER_VAR:-}}"
          NAS_PASSWORD="${NAS_PASSWORD:-${NAS_PASSWORD_VAR:-}}"
          NAS_PROJECT_DIR="${NAS_PROJECT_DIR:-${NAS_PROJECT_DIR_VAR:-}}"
          NAS_GIT_URL="${NAS_GIT_URL:-${NAS_GIT_URL_VAR:-}}"
          NAS_GIT_REF="${NAS_GIT_REF:-${NAS_GIT_REF_VAR:-}}"

          : "${NAS_HOST:?Missing NAS_HOST (set in Secrets or Workflow Variables)}"
          : "${NAS_USER:?Missing NAS_USER (set in Secrets or Workflow Variables)}"
          : "${NAS_PASSWORD:?Missing NAS_PASSWORD (set in Secrets or Workflow Variables)}"

          if [ -z "${NAS_PORT:-}" ]; then
            NAS_PORT="22"
          fi
          if [ -z "${NAS_PROJECT_DIR:-}" ]; then
            NAS_PROJECT_DIR="/vol1/1000/quant"
          fi

          echo "Deploy target: ${NAS_USER}@${NAS_HOST}:${NAS_PORT} dir=${NAS_PROJECT_DIR}"

          # Use deploy.sh + docker compose on NAS so runtime env comes from .env.
          sshpass -p "${NAS_PASSWORD}" \
            ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -p "${NAS_PORT}" \
              "${NAS_USER}@${NAS_HOST}" \
              "NAS_GIT_URL='${NAS_GIT_URL}' NAS_GIT_REF='${NAS_GIT_REF}' bash -lc '
                set -euo pipefail
                echo \"Remote user: $(whoami)\" 
                echo \"Remote id: $(id)\"
                echo \"Check NAS_PROJECT_DIR=${NAS_PROJECT_DIR}\"
                if [ ! -d \"${NAS_PROJECT_DIR}\" ]; then
                  echo \"ERROR: NAS_PROJECT_DIR does not exist or is not a directory: ${NAS_PROJECT_DIR}\" >&2
                  exit 4
                fi
                ls -ld \"${NAS_PROJECT_DIR}\" || true
                if [ ! -r \"${NAS_PROJECT_DIR}\" ]; then echo \"ERROR: no read permission on ${NAS_PROJECT_DIR}\" >&2; exit 4; fi
                if [ ! -x \"${NAS_PROJECT_DIR}\" ]; then echo \"ERROR: no execute (cd) permission on ${NAS_PROJECT_DIR}\" >&2; exit 4; fi
                if [ ! -w \"${NAS_PROJECT_DIR}\" ]; then echo \"ERROR: no write permission on ${NAS_PROJECT_DIR}\" >&2; exit 4; fi
                cd \"${NAS_PROJECT_DIR}\"

                # Bootstrap: if this is not a git repo, clone into the target directory (must be empty).
                if [ ! -d .git ]; then
                  echo \"NAS_PROJECT_DIR is not a git repository\"
                  if [ -z \"${NAS_GIT_URL:-}\" ]; then
                    echo \"ERROR: NAS_GIT_URL not set. Either clone the repo to ${NAS_PROJECT_DIR} manually, or set NAS_GIT_URL in workflow Secrets/Variables.\" >&2
                    exit 2
                  fi
                  if [ -n \"$(ls -A 2>/dev/null || true)\" ]; then
                    echo \"ERROR: ${NAS_PROJECT_DIR} is not empty, cannot git clone into it.\" >&2
                    echo \"Fix: empty the directory or set NAS_PROJECT_DIR to an empty directory, then re-run.\" >&2
                    exit 2
                  fi
                  if [ -z \"${NAS_GIT_REF:-}\" ]; then NAS_GIT_REF=\"main\"; fi
                  if ! command -v git >/dev/null 2>&1; then
                    echo \"ERROR: git not found on NAS.\" >&2
                    exit 2
                  fi
                  echo \"Cloning repository into ${NAS_PROJECT_DIR} (ref=${NAS_GIT_REF})\"
                  git clone --depth 1 --branch \"${NAS_GIT_REF}\" \"${NAS_GIT_URL}\" .
                fi

                git fetch --all --prune
                if git show-ref --verify --quiet refs/remotes/origin/main; then
                  git reset --hard origin/main
                elif git show-ref --verify --quiet refs/remotes/origin/master; then
                  git reset --hard origin/master
                else
                  echo \"ERROR: origin/main or origin/master not found on NAS repo\" >&2
                  exit 3
                fi

                # .env is now tracked in the repo (non-secret defaults). Ensure it's present after sync.
                if [ ! -f .env ]; then
                  echo \"ERROR: ${NAS_PROJECT_DIR}/.env missing after git reset.\" >&2
                  echo \"Fix: ensure .env exists in repo or create it on NAS.\" >&2
                  exit 2
                fi

                chmod +x deploy.sh
                ./deploy.sh build
                ./deploy.sh start
              '"
