# Gitea CI/CD 工作流 - Docker构建和部署到NAS
# 文件位置: .gitea/workflows/deploy.yml

name: Build & Deploy to NAS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NAS_HOST: 192.168.5.22
  NAS_PORT: 22

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: quant-stock-bot:latest
          load: true

      - name: Save Docker image
        run: |
          docker save quant-stock-bot:latest -o /tmp/quant-stock-bot.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/quant-stock-bot.tar
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Deploy to NAS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: ${{ env.NAS_PORT }}
          script: |
            # 加载Docker镜像
            docker load -i /tmp/quant-stock-bot.tar || true
            
            # 停止旧容器
            docker stop quant-stock-bot 2>/dev/null || true
            docker rm quant-stock-bot 2>/dev/null || true
            
            # 启动新容器
            docker run -d \
              --name quant-stock-bot \
              --restart unless-stopped \
              -e TZ=Asia/Shanghai \
              -v /root/quant_agent/data:/app/data \
              -v /root/quant_agent/logs:/app/logs \
              quant-stock-bot:latest
            
            # 清理
            rm -f /tmp/quant-stock-bot.tar
            
            echo "部署完成!"
            docker ps --filter name=quant-stock-bot
