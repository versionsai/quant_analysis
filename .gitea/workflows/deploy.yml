# Gitea CI/CD - 简单部署到NAS
# 由于runner无法访问GitHub，使用简单脚本方式

name: Deploy to NAS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          port: 51022
          script: |
            cd /root/quant_agent
            
            # 拉取最新代码
            git pull origin main
            
            # 构建Docker镜像
            docker build -t quant-stock-bot:latest .
            
            # 停止旧容器
            docker stop quant-stock-bot 2>/dev/null || true
            docker rm quant-stock-bot 2>/dev/null || true
            
            # 启动新容器
            docker run -d \
              --name quant-stock-bot \
              --restart unless-stopped \
              -e TZ=Asia/Shanghai \
              -v /root/quant_agent/data:/app/data \
              -v /root/quant_agent/logs:/app/logs \
              quant-stock-bot:latest
            
            echo "部署完成!"
            docker ps --filter name=quant-stock-bot
