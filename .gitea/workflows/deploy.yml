# 简单部署到NAS

name: Deploy to NAS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment
        run: |
          # 安装sshpass
          apt-get update && apt-get install -y sshpass
          
          # 部署命令
          sshpass -p "${{ secrets.NAS_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p 51022 ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} "
            cd /root/quant_agent && \
            git pull origin main && \
            docker build -t quant-stock-bot:latest . && \
            docker stop quant-stock-bot 2>/dev/null || true && \
            docker rm quant-stock-bot 2>/dev/null || true && \
            docker run -d --name quant-stock-bot --restart unless-stopped -e TZ=Asia/Shanghai -v /root/quant_agent/data:/app/data -v /root/quant_agent/logs:/app/logs quant-stock-bot:latest && \
            echo '部署完成' && \
            docker ps --filter name=quant-stock-bot
          "
