# 部署到NAS

name: Deploy to NAS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Prefer secrets, but allow workflow/repo variables as fallback (Gitea UI: 设置-工作流-变量).
      NAS_HOST: ${{ secrets.NAS_HOST }}
      NAS_PORT: ${{ secrets.NAS_PORT }}
      NAS_USER: ${{ secrets.NAS_USER }}
      NAS_PASSWORD: ${{ secrets.NAS_PASSWORD }}
      NAS_DEPLOY_DIR: ${{ secrets.NAS_DEPLOY_DIR }}
      NAS_CONTAINER_NAME: ${{ secrets.NAS_CONTAINER_NAME }}
      NAS_HOST_VAR: ${{ vars.NAS_HOST }}
      NAS_PORT_VAR: ${{ vars.NAS_PORT }}
      NAS_USER_VAR: ${{ vars.NAS_USER }}
      NAS_PASSWORD_VAR: ${{ vars.NAS_PASSWORD }}
      NAS_DEPLOY_DIR_VAR: ${{ vars.NAS_DEPLOY_DIR }}
      NAS_CONTAINER_NAME_VAR: ${{ vars.NAS_CONTAINER_NAME }}
      # Runtime env (optional).
      BARK_KEY: ${{ secrets.BARK_KEY }}
      PUSH_TIME_MORNING: ${{ secrets.PUSH_TIME_MORNING }}
      PUSH_TIME_AFTERNOON: ${{ secrets.PUSH_TIME_AFTERNOON }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      BARK_KEY_VAR: ${{ vars.BARK_KEY }}
      PUSH_TIME_MORNING_VAR: ${{ vars.PUSH_TIME_MORNING }}
      PUSH_TIME_AFTERNOON_VAR: ${{ vars.PUSH_TIME_AFTERNOON }}
      LOG_LEVEL_VAR: ${{ vars.LOG_LEVEL }}
    steps:
      - name: Install Prerequisites (Node + Git + Docker)
        run: |
          set -e
          if command -v apt-get >/dev/null 2>&1; then
            (sudo -n true 2>/dev/null && sudo apt-get update && sudo apt-get install -y git nodejs npm ca-certificates) || \
            (apt-get update && apt-get install -y git nodejs npm ca-certificates)
            (sudo -n true 2>/dev/null && sudo apt-get install -y docker.io) || \
            (apt-get install -y docker.io)
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache git nodejs npm ca-certificates docker docker-cli
          elif command -v yum >/dev/null 2>&1; then
            yum install -y git nodejs npm ca-certificates docker
          else
            echo "Unsupported runner OS: no apt-get/apk/yum found" >&2
            exit 1
          fi

          node -v
          npm -v || true
          git --version
          docker --version

          # Ensure Docker daemon is running on the runner.
          if ! docker info >/dev/null 2>&1; then
            echo "Docker daemon not ready, attempting to start..." >&2
            (sudo -n true 2>/dev/null && sudo service docker start) || true
            (sudo -n true 2>/dev/null && sudo systemctl start docker) || true
            if command -v dockerd >/dev/null 2>&1; then
              nohup dockerd > /tmp/dockerd.log 2>&1 &
            fi
            for i in $(seq 1 30); do
              if docker info >/dev/null 2>&1; then
                break
              fi
              sleep 1
            done
          fi

          if ! docker info >/dev/null 2>&1; then
            echo "ERROR: Docker daemon is not available on this runner." >&2
            echo "Fix: run a Docker-capable Gitea runner (docker executor / privileged), or mount /var/run/docker.sock into the runner container." >&2
            echo "If you're using act for local testing, ensure the job container has docker installed and has access to the host docker socket." >&2
            exit 1
          fi

      - name: Checkout
        uses: https://gitea.com/actions/checkout@v4

      - name: Install SSH Client
        run: |
          set -e
          if command -v apt-get >/dev/null 2>&1; then
            (sudo -n true 2>/dev/null && sudo apt-get update && sudo apt-get install -y openssh-client sshpass) || \
            (apt-get update && apt-get install -y openssh-client sshpass)
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache openssh-client sshpass
          elif command -v yum >/dev/null 2>&1; then
            yum install -y openssh-clients sshpass
          else
            echo "Unsupported runner OS: no apt-get/apk/yum found" >&2
            exit 1
          fi

      - name: Build Docker Image (Runner)
        run: |
          set -euo pipefail
          docker version
          docker build -t quant-stock-bot:latest .

      - name: Push Image to NAS Docker (SSH)
        run: |
          set -euo pipefail

          # Resolve inputs (secret first, then variable fallback).
          NAS_HOST="${NAS_HOST:-${NAS_HOST_VAR:-}}"
          NAS_PORT="${NAS_PORT:-${NAS_PORT_VAR:-}}"
          NAS_USER="${NAS_USER:-${NAS_USER_VAR:-}}"
          NAS_PASSWORD="${NAS_PASSWORD:-${NAS_PASSWORD_VAR:-}}"
          NAS_DEPLOY_DIR="${NAS_DEPLOY_DIR:-${NAS_DEPLOY_DIR_VAR:-}}"
          NAS_CONTAINER_NAME="${NAS_CONTAINER_NAME:-${NAS_CONTAINER_NAME_VAR:-}}"
          BARK_KEY="${BARK_KEY:-${BARK_KEY_VAR:-}}"
          PUSH_TIME_MORNING="${PUSH_TIME_MORNING:-${PUSH_TIME_MORNING_VAR:-}}"
          PUSH_TIME_AFTERNOON="${PUSH_TIME_AFTERNOON:-${PUSH_TIME_AFTERNOON_VAR:-}}"
          LOG_LEVEL="${LOG_LEVEL:-${LOG_LEVEL_VAR:-}}"

          : "${NAS_HOST:?Missing NAS_HOST (Secrets/Variables)}"
          : "${NAS_USER:?Missing NAS_USER (Secrets/Variables)}"
          : "${NAS_PASSWORD:?Missing NAS_PASSWORD (Secrets/Variables)}"

          if [ -z "${NAS_PORT:-}" ]; then NAS_PORT="22"; fi
          if [ -z "${NAS_DEPLOY_DIR:-}" ]; then NAS_DEPLOY_DIR="/vol1/1000/quant"; fi
          if [ -z "${NAS_CONTAINER_NAME:-}" ]; then NAS_CONTAINER_NAME="quant-stock-bot"; fi
          if [ -z "${PUSH_TIME_MORNING:-}" ]; then PUSH_TIME_MORNING="09:30"; fi
          if [ -z "${PUSH_TIME_AFTERNOON:-}" ]; then PUSH_TIME_AFTERNOON="14:30"; fi
          if [ -z "${LOG_LEVEL:-}" ]; then LOG_LEVEL="INFO"; fi

          echo "Deploy target: ${NAS_USER}@${NAS_HOST}:${NAS_PORT} dir=${NAS_DEPLOY_DIR} container=${NAS_CONTAINER_NAME}"

          sshpass -p "${NAS_PASSWORD}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "${NAS_PORT}" "${NAS_USER}@${NAS_HOST}" "docker version"

          # Stream image to NAS and load it into local Docker on NAS.
          docker save quant-stock-bot:latest | \
            sshpass -p "${NAS_PASSWORD}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "${NAS_PORT}" "${NAS_USER}@${NAS_HOST}" \
              "docker load"

          # Restart container on NAS with persistent volumes under NAS_DEPLOY_DIR.
          sshpass -p "${NAS_PASSWORD}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "${NAS_PORT}" "${NAS_USER}@${NAS_HOST}" \
            "set -e
             mkdir -p '${NAS_DEPLOY_DIR}/data' '${NAS_DEPLOY_DIR}/logs'
             docker rm -f '${NAS_CONTAINER_NAME}' >/dev/null 2>&1 || true
             docker run -d --name '${NAS_CONTAINER_NAME}' --restart unless-stopped \
               -e TZ=Asia/Shanghai \
               -e BARK_KEY='${BARK_KEY}' \
               -e PUSH_TIME_MORNING='${PUSH_TIME_MORNING}' \
               -e PUSH_TIME_AFTERNOON='${PUSH_TIME_AFTERNOON}' \
               -e LOG_LEVEL='${LOG_LEVEL}' \
               -v '${NAS_DEPLOY_DIR}/data:/app/data' \
               -v '${NAS_DEPLOY_DIR}/logs:/app/logs' \
               quant-stock-bot:latest
             docker ps --filter \"name=${NAS_CONTAINER_NAME}\" --format \"table {{.Names}}\\t{{.Status}}\\t{{.Image}}\""
