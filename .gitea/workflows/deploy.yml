# 部署到NAS - 使用Webhook方式
# NAS上的代码通过Git自动拉取

name: Deploy to NAS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify deployment
        run: |
          echo "代码已推送到Gitea仓库"
          echo "NAS将自动通过Git Hook拉取最新代码"
          echo ""
          echo "如需手动部署，请在NAS上执行:"
          echo "  cd /root/quant_agent && git pull origin main"
