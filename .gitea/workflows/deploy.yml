# 部署到NAS

name: Deploy to NAS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Prefer secrets, but allow workflow/repo variables as fallback (Gitea UI: 设置-工作流-变量).
      NAS_HOST: ${{ secrets.NAS_HOST }}
      NAS_PORT: ${{ secrets.NAS_PORT }}
      NAS_USER: ${{ secrets.NAS_USER }}
      NAS_PASSWORD: ${{ secrets.NAS_PASSWORD }}
      NAS_PROJECT_DIR: ${{ secrets.NAS_PROJECT_DIR }}
      # Backward compatible (deprecated): use NAS_PROJECT_DIR instead.
      NAS_DEPLOY_DIR: ${{ secrets.NAS_DEPLOY_DIR }}
      NAS_CONTAINER_NAME: ${{ secrets.NAS_CONTAINER_NAME }}
      NAS_HOST_VAR: ${{ vars.NAS_HOST }}
      NAS_PORT_VAR: ${{ vars.NAS_PORT }}
      NAS_USER_VAR: ${{ vars.NAS_USER }}
      NAS_PASSWORD_VAR: ${{ vars.NAS_PASSWORD }}
      NAS_PROJECT_DIR_VAR: ${{ vars.NAS_PROJECT_DIR }}
      # Backward compatible (deprecated): use NAS_PROJECT_DIR_VAR instead.
      NAS_DEPLOY_DIR_VAR: ${{ vars.NAS_DEPLOY_DIR }}
      NAS_CONTAINER_NAME_VAR: ${{ vars.NAS_CONTAINER_NAME }}
      # Runtime env (optional).
      BARK_KEY: ${{ secrets.BARK_KEY }}
      PUSH_TIME_MORNING: ${{ secrets.PUSH_TIME_MORNING }}
      PUSH_TIME_AFTERNOON: ${{ secrets.PUSH_TIME_AFTERNOON }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      BARK_KEY_VAR: ${{ vars.BARK_KEY }}
      PUSH_TIME_MORNING_VAR: ${{ vars.PUSH_TIME_MORNING }}
      PUSH_TIME_AFTERNOON_VAR: ${{ vars.PUSH_TIME_AFTERNOON }}
      LOG_LEVEL_VAR: ${{ vars.LOG_LEVEL }}
      # AI Agent
      ENABLE_AI_AGENT: ${{ secrets.ENABLE_AI_AGENT }}
      SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
      SILICONFLOW_MODEL: ${{ vars.SILICONFLOW_MODEL }}
      NEWS_REPORT_TIME: ${{ vars.NEWS_REPORT_TIME }}
      # Futu OpenD
      FUTU_HOST: ${{ secrets.FUTU_HOST }}
      FUTU_PORT: ${{ secrets.FUTU_PORT }}
      FUTU_HOST_VAR: ${{ vars.FUTU_HOST }}
      FUTU_PORT_VAR: ${{ vars.FUTU_PORT }}
    steps:
      - name: Install Prerequisites (Node + Git + SSH)
        run: |
          set -e
          if command -v apt-get >/dev/null 2>&1; then
            (sudo -n true 2>/dev/null && sudo apt-get update && sudo apt-get install -y git nodejs npm ca-certificates) || \
            (apt-get update && apt-get install -y git nodejs npm ca-certificates)
            (sudo -n true 2>/dev/null && sudo apt-get install -y openssh-client sshpass) || \
            (apt-get install -y openssh-client sshpass)
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache git nodejs npm ca-certificates openssh-client sshpass
          elif command -v yum >/dev/null 2>&1; then
            yum install -y git nodejs npm ca-certificates openssh-clients sshpass
          else
            echo "Unsupported runner OS: no apt-get/apk/yum found" >&2
            exit 1
          fi

          node -v
          npm -v || true
          git --version

      - name: Checkout
        uses: https://gitea.com/actions/checkout@v4

      - name: Build And Deploy On NAS Docker (SSH)
        run: |
          set -euo pipefail

          # Resolve inputs (secret first, then variable fallback).
          NAS_HOST="${NAS_HOST:-${NAS_HOST_VAR:-}}"
          NAS_PORT="${NAS_PORT:-${NAS_PORT_VAR:-}}"
          NAS_USER="${NAS_USER:-${NAS_USER_VAR:-}}"
          NAS_PASSWORD="${NAS_PASSWORD:-${NAS_PASSWORD_VAR:-}}"
          NAS_PROJECT_DIR="${NAS_PROJECT_DIR:-${NAS_PROJECT_DIR_VAR:-${NAS_DEPLOY_DIR:-${NAS_DEPLOY_DIR_VAR:-}}}}"
          NAS_CONTAINER_NAME="${NAS_CONTAINER_NAME:-${NAS_CONTAINER_NAME_VAR:-}}"
          BARK_KEY="${BARK_KEY:-${BARK_KEY_VAR:-}}"
          PUSH_TIME_MORNING="${PUSH_TIME_MORNING:-${PUSH_TIME_MORNING_VAR:-}}"
          PUSH_TIME_AFTERNOON="${PUSH_TIME_AFTERNOON:-${PUSH_TIME_AFTERNOON_VAR:-}}"
          LOG_LEVEL="${LOG_LEVEL:-${LOG_LEVEL_VAR:-}}"
          ENABLE_AI_AGENT="${ENABLE_AI_AGENT:-}"
          SILICONFLOW_API_KEY="${SILICONFLOW_API_KEY:-}"
          SILICONFLOW_MODEL="${SILICONFLOW_MODEL:-deepseek-ai/DeepSeek-V3}"
          NEWS_REPORT_TIME="${NEWS_REPORT_TIME:-09:00}"
          FUTU_HOST="${FUTU_HOST:-${FUTU_HOST_VAR:-127.0.0.1}}"
          FUTU_PORT="${FUTU_PORT:-${FUTU_PORT_VAR:-11111}}"

          : "${NAS_HOST:?Missing NAS_HOST (Secrets/Variables)}"
          : "${NAS_USER:?Missing NAS_USER (Secrets/Variables)}"
          : "${NAS_PASSWORD:?Missing NAS_PASSWORD (Secrets/Variables)}"

          if [ -z "${NAS_PORT:-}" ]; then NAS_PORT="22"; fi
          if [ -z "${NAS_PROJECT_DIR:-}" ]; then NAS_PROJECT_DIR="/vol1/1000/quant"; fi
          if [ -z "${NAS_CONTAINER_NAME:-}" ]; then NAS_CONTAINER_NAME="quant-stock-bot"; fi
          if [ -z "${PUSH_TIME_MORNING:-}" ]; then PUSH_TIME_MORNING="09:30"; fi
          if [ -z "${PUSH_TIME_AFTERNOON:-}" ]; then PUSH_TIME_AFTERNOON="14:30"; fi
          if [ -z "${LOG_LEVEL:-}" ]; then LOG_LEVEL="INFO"; fi

          echo "Deploy target: ${NAS_USER}@${NAS_HOST}:${NAS_PORT} dir=${NAS_PROJECT_DIR} container=${NAS_CONTAINER_NAME}"
          # Avoid quoting issues when NAS_PASSWORD contains special characters.
          SUDO_PASS_B64="$(printf '%s' "${NAS_PASSWORD}" | base64 | tr -d '\n')"

          # Preflight: verify runner can reach NAS SSH and authenticate.
          echo "Preflight: tcp check ${NAS_HOST}:${NAS_PORT}"
          if command -v timeout >/dev/null 2>&1; then
            timeout 5 bash -lc "cat < /dev/null > /dev/tcp/${NAS_HOST}/${NAS_PORT}" || {
              echo "ERROR: cannot reach ${NAS_HOST}:${NAS_PORT} from runner (connection refused/timeout)." >&2
              echo "Fix: ensure act-runner job network can access NAS LAN, and NAS_PORT is really the SSH port (usually 22)." >&2
              exit 1
            }
          fi

          echo "Preflight: ssh login"
          sshpass -p "${NAS_PASSWORD}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "${NAS_PORT}" "${NAS_USER}@${NAS_HOST}" \
            "set -e; echo ssh_ok; whoami; id" >/dev/null

          remote_sh() {
            sshpass -p "${NAS_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o GlobalKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              -p "${NAS_PORT}" \
              "${NAS_USER}@${NAS_HOST}" "$@"
          }

          remote_sudo_docker() {
            # Feed sudo password via stdin; keep command args simple.
            remote_sh "printf '%s' '${SUDO_PASS_B64}' | base64 -d | sudo -S -p '' docker $*"
          }

          echo "Preflight: docker availability on NAS"
          remote_sudo_docker version >/dev/null
          echo "Preflight: sudo auth on NAS"
          remote_sh "printf '%s' '${SUDO_PASS_B64}' | base64 -d | sudo -S -p '' -v" >/dev/null

          echo "Prepare persistent dirs on NAS"
          remote_sh "set -e; mkdir -p '${NAS_PROJECT_DIR}/data' '${NAS_PROJECT_DIR}/logs'"

          echo "Transfer and extract code to NAS"
          CTX_TAR="/tmp/quant_agent_ctx_${GITHUB_RUN_ID:-$$}.tar"
          tar -cf - --exclude=.git . | remote_sh "cat > '${CTX_TAR}'"
          CTX_DIR="/tmp/quant_agent_ctx_${GITHUB_RUN_ID:-$$}"
          remote_sh "rm -rf '${CTX_DIR}' && mkdir -p '${CTX_DIR}'"
          remote_sh "tar -xf '${CTX_TAR}' -C '${CTX_DIR}'"

          echo "Inject secrets into .env on NAS"
          remote_sh "set -e; if [ ! -f '${CTX_DIR}/.env' ]; then if [ -f '${CTX_DIR}/.env.example' ]; then cp '${CTX_DIR}/.env.example' '${CTX_DIR}/.env'; else : > '${CTX_DIR}/.env'; fi; fi"
          inject_secret() {
            local key="$1"; shift
            local val="$1"; shift
            if [ -n "${val}" ]; then
              # Escape sed delimiter '|'
              local escaped_val
              escaped_val="$(printf '%s' "${val}" | sed 's/|/\\|/g')"
              # Note: use \\$f to avoid expanding an unset local variable (set -u).
              remote_sh "set -e; f='${CTX_DIR}/.env'; if grep -q '^${key}=' \"\\$f\"; then sed -i 's|^${key}=.*|${key}=${escaped_val}|' \"\\$f\"; else printf '%s=%s\\n' '${key}' '${escaped_val}' >> \"\\$f\"; fi"
              echo "  ${key} = [SET]"
            else
              echo "  ${key} = [SKIP - empty]"
            fi
          }
          inject_secret "BARK_KEY" "${BARK_KEY}"
          inject_secret "PUSH_TIME_MORNING" "${PUSH_TIME_MORNING}"
          inject_secret "PUSH_TIME_AFTERNOON" "${PUSH_TIME_AFTERNOON}"
          inject_secret "LOG_LEVEL" "${LOG_LEVEL}"
          inject_secret "ENABLE_AI_AGENT" "${ENABLE_AI_AGENT}"
          inject_secret "SILICONFLOW_API_KEY" "${SILICONFLOW_API_KEY}"
          inject_secret "SILICONFLOW_MODEL" "${SILICONFLOW_MODEL}"
          inject_secret "NEWS_REPORT_TIME" "${NEWS_REPORT_TIME}"
          inject_secret "FUTU_HOST" "${FUTU_HOST}"
          inject_secret "FUTU_PORT" "${FUTU_PORT}"

          echo "Persist runtime .env on NAS"
          remote_sh "cp '${CTX_DIR}/.env' '${NAS_PROJECT_DIR}/.env'"

          echo "Build Docker image on NAS"
          remote_sh "printf '%s' '${SUDO_PASS_B64}' | base64 -d | sudo -S -p '' docker build -t quant-stock-bot:latest '${CTX_DIR}'"

          echo "Restart container on NAS"
          remote_sh "printf '%s' '${SUDO_PASS_B64}' | base64 -d | sudo -S -p '' docker rm -f '${NAS_CONTAINER_NAME}' >/dev/null 2>&1 || true"
          remote_sh "printf '%s' '${SUDO_PASS_B64}' | base64 -d | sudo -S -p '' docker run -d --name '${NAS_CONTAINER_NAME}' --restart unless-stopped \
            -e TZ=Asia/Shanghai \
            --env-file '${NAS_PROJECT_DIR}/.env' \
            -v '${NAS_PROJECT_DIR}/data:/app/runtime/data' \
            -v '${NAS_PROJECT_DIR}/logs:/app/logs' \
            quant-stock-bot:latest"
          remote_sh "printf '%s' '${SUDO_PASS_B64}' | base64 -d | sudo -S -p '' docker ps --filter \"name=${NAS_CONTAINER_NAME}\" --format \"table {{.Names}}\\t{{.Status}}\\t{{.Image}}\""

          echo "Cleanup temp build context on NAS"
          remote_sh "rm -rf '${CTX_DIR}' '${CTX_TAR}'" || true
