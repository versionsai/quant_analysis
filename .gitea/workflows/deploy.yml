# 部署到NAS

name: Deploy to NAS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NAS_HOST: ${{ secrets.NAS_HOST }}
      NAS_PORT: ${{ secrets.NAS_PORT }}
      NAS_USER: ${{ secrets.NAS_USER }}
      NAS_PASSWORD: ${{ secrets.NAS_PASSWORD }}
      NAS_PROJECT_DIR: ${{ secrets.NAS_PROJECT_DIR }}
    steps:
      - name: Install SSH Client
        run: |
          set -e
          if command -v apt-get >/dev/null 2>&1; then
            (sudo -n true 2>/dev/null && sudo apt-get update && sudo apt-get install -y openssh-client sshpass) || \
            (apt-get update && apt-get install -y openssh-client sshpass)
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache openssh-client sshpass
          elif command -v yum >/dev/null 2>&1; then
            yum install -y openssh-clients sshpass
          else
            echo "Unsupported runner OS: no apt-get/apk/yum found" >&2
            exit 1
          fi

      - name: Deploy to NAS
        run: |
          set -euo pipefail

          : "${NAS_HOST:?Missing secret NAS_HOST}"
          : "${NAS_USER:?Missing secret NAS_USER}"
          : "${NAS_PASSWORD:?Missing secret NAS_PASSWORD}"

          if [ -z "${NAS_PORT:-}" ]; then
            NAS_PORT="22"
          fi
          if [ -z "${NAS_PROJECT_DIR:-}" ]; then
            NAS_PROJECT_DIR="/root/quant_agent"
          fi

          echo "Deploy target: ${NAS_USER}@${NAS_HOST}:${NAS_PORT} dir=${NAS_PROJECT_DIR}"

          # Use deploy.sh + docker compose on NAS so BARK_KEY / push times come from .env.
          sshpass -p "${NAS_PASSWORD}" \
            ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -p "${NAS_PORT}" \
              "${NAS_USER}@${NAS_HOST}" \
              "bash -lc '
                set -euo pipefail
                cd \"${NAS_PROJECT_DIR}\"

                if [ ! -f .env ]; then
                  echo \"ERROR: ${NAS_PROJECT_DIR}/.env missing. Run ./deploy.sh init once on NAS and set BARK_KEY.\" >&2
                  exit 2
                fi

                git fetch --all --prune
                if git show-ref --verify --quiet refs/remotes/origin/main; then
                  git reset --hard origin/main
                elif git show-ref --verify --quiet refs/remotes/origin/master; then
                  git reset --hard origin/master
                else
                  echo \"ERROR: origin/main or origin/master not found on NAS repo\" >&2
                  exit 3
                fi

                chmod +x deploy.sh
                ./deploy.sh build
                ./deploy.sh start
              '"
