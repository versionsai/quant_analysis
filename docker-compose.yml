version: '3.8'

services:
  quant-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant-stock-bot
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - BARK_KEY=${BARK_KEY}
      - PUSH_TIME_MORNING=${PUSH_TIME_MORNING:-09:28}
      - PUSH_TIME_AFTERNOON=${PUSH_TIME_AFTERNOON:-13:10}
      - NEWS_REPORT_TIME=${NEWS_REPORT_TIME:-09:00}
      - DATABASE_PATH=${DATABASE_PATH:-/app/runtime/data/recommend.db}
      - ENABLE_AI_AGENT=${ENABLE_AI_AGENT:-false}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_MODEL=${SILICONFLOW_MODEL:-deepseek-ai/DeepSeek-V3}
      - FUTU_HOST=${FUTU_HOST:-127.0.0.1}
      - FUTU_PORT=${FUTU_PORT:-11111}
    env_file:
      - .env
    volumes:
      # Don't mount into /app/data (Python package name conflict). Use runtime dir for persistence.
      - ./runtime/data:/app/runtime/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
