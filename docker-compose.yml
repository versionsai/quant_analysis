version: '3.8'

services:
  quant-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant-stock-bot
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - BARK_KEY=${BARK_KEY}
      - SERVERCHAN_SENDKEY=${SERVERCHAN_SENDKEY}
      - PUSH_TIME_MORNING=${PUSH_TIME_MORNING:-09:28}
      - PUSH_TIME_AFTERNOON=${PUSH_TIME_AFTERNOON:-13:10}
      - PUSH_TIME_CLOSE=${PUSH_TIME_CLOSE:-15:30}
      - INTRADAY_TRAP_PUSH_TIMES=${INTRADAY_TRAP_PUSH_TIMES:-09:45,10:00,10:30,10:45,11:30,13:15,13:45,14:15,14:30,14:45,15:00}
      - NEWS_REPORT_TIME=${NEWS_REPORT_TIME:-09:00}
      - DATABASE_PATH=${DATABASE_PATH:-/app/runtime/data/recommend.db}
      - ENABLE_AI_AGENT=${ENABLE_AI_AGENT:-false}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_MODEL=${SILICONFLOW_MODEL:-deepseek-ai/DeepSeek-V3}
      - FUTU_HOST=${FUTU_HOST:-127.0.0.1}
      - FUTU_PORT=${FUTU_PORT:-11111}
    env_file:
      - .env
    volumes:
      # Don't mount into /app/data (Python package name conflict). Use runtime dir for persistence.
      - ./runtime/data:/app/runtime/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  quant-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant-stock-dashboard
    restart: unless-stopped
    command: ["python", "dashboard.py", "--host", "0.0.0.0"]
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_PATH=${DATABASE_PATH:-/app/runtime/data/recommend.db}
      - ENABLE_AI_AGENT=${ENABLE_AI_AGENT:-false}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_MODEL=${SILICONFLOW_MODEL:-deepseek-ai/DeepSeek-V3}
      - FUTU_HOST=${FUTU_HOST:-127.0.0.1}
      - FUTU_PORT=${FUTU_PORT:-11111}
      - BARK_KEY=${BARK_KEY}
      - SERVERCHAN_SENDKEY=${SERVERCHAN_SENDKEY}
      - NEWS_REPORT_TIME=${NEWS_REPORT_TIME:-09:00}
      - PUSH_TIME_MORNING=${PUSH_TIME_MORNING:-09:28}
      - PUSH_TIME_AFTERNOON=${PUSH_TIME_AFTERNOON:-13:10}
      - PUSH_TIME_CLOSE=${PUSH_TIME_CLOSE:-15:30}
      - INTRADAY_TRAP_PUSH_TIMES=${INTRADAY_TRAP_PUSH_TIMES:-09:45,10:00,10:30,10:45,11:30,13:15,13:45,14:15,14:30,14:45,15:00}
    env_file:
      - .env
    volumes:
      - ./runtime/data:/app/runtime/data
      - ./logs:/app/logs
    ports:
      - "18675:18675"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18675/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
